{% extends "base.html" %}
{% block trust %}{% endblock %}
{% block content %}
<h1>Warengruppen</h1>
<p><a href="/admin">Admin</a> · <a href="/admin/products">Artikel</a></p>
<form method="post" action="/admin/categories">
  <label>Name <input type="text" name="name" required placeholder="z. B. Snacks" /></label>
  <label>Sortierung (Zahl) <input type="number" name="sort_order" value="0" /></label>
  <button type="submit">Anlegen</button>
</form>
<table role="grid">
  <thead><tr><th>Name</th><th>Sortierung</th><th></th></tr></thead>
  <tbody>
    {% for c in categories %}
    <tr>
      <td>{{ c['name'] }}</td>
      <td>{{ c['sort_order'] }}</td>
      <td>
        <form method="post" action="/admin/categories/{{ c['id'] }}/delete" onsubmit="return confirm('Warengruppe löschen?');">
          <button type="submit" class="secondary">Löschen</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
