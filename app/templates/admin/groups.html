{% extends "admin/shell.html" %}
{% block admin_page %}
<a href="/admin" class="admin-back">← Admin-Übersicht</a>
<article class="k-panel">
  <h2 style="margin-top:0;font-size:1.1rem">Neue Gruppe</h2>
  <form method="post" action="/admin/groups">
    <label>Name <input type="text" name="name" required placeholder="z. B. Büro 1" /></label>
    <button type="submit">Anlegen</button>
  </form>
</article>
<div class="table-wrap">
  <table role="grid" class="admin-table-groups">
    <thead><tr><th>Name</th><th class="th-sort">Reihenfolge</th><th class="th-actions">Aktionen</th></tr></thead>
    <tbody>
      {% for g in groups %}
      <tr>
        <td>{{ g['name'] }}</td>
        <td class="td-sort">
          <div class="td-sort__inner">
            <form method="post" action="/admin/groups/{{ g['id'] }}/sort" class="form-inline-action">
              <input type="hidden" name="direction" value="up" />
              <button type="submit" class="secondary admin-btn-sm" title="Nach oben">↑</button>
            </form>
            <form method="post" action="/admin/groups/{{ g['id'] }}/sort" class="form-inline-action">
              <input type="hidden" name="direction" value="down" />
              <button type="submit" class="secondary admin-btn-sm" title="Nach unten">↓</button>
            </form>
          </div>
        </td>
        <td class="td-actions">
          <div class="td-actions__inner">
            <a href="/admin/groups/{{ g['id'] }}/edit" class="admin-btn-sm admin-btn-edit">Bearbeiten</a>
            <form method="post" action="/admin/groups/{{ g['id'] }}/delete" class="form-inline-action" onsubmit="return confirm('Gruppe wirklich löschen?');">
              <button type="submit" class="secondary admin-btn-sm">Löschen</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
