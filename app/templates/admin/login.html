{% extends "base.html" %}
{% block body_class %}app-admin{% endblock %}
{% block trust %}{% endblock %}
{% block content %}
<header class="page-head">
  <p class="page-head__eyebrow">Geschützter Bereich</p>
  <h1 class="page-head__title">Admin-Login</h1>
</header>
{% if error %}
<article class="contrast">{{ error }}</article>
{% endif %}
<article class="k-panel">
  <form method="post" action="/admin/login">
    <label>Passwort <input type="password" name="password" required autocomplete="current-password" autofocus /></label>
    <button type="submit">Anmelden</button>
  </form>
</article>
<p><a href="/" class="admin-back">← Zurück</a></p>
{% endblock %}
