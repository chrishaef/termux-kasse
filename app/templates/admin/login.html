{% extends "base.html" %}
{% block trust %}{% endblock %}
{% block content %}
<h1>Admin-Login</h1>
{% if error %}
<article class="contrast">{{ error }}</article>
{% endif %}
<form method="post" action="/admin/login">
  <label>Benutzername <input type="text" name="username" required autocomplete="username" /></label>
  <label>Passwort <input type="password" name="password" required autocomplete="current-password" /></label>
  <button type="submit">Anmelden</button>
</form>
{% if setup_needed %}
<p><a href="/admin/setup">Ersteinrichtung (ersten Admin anlegen)</a></p>
{% endif %}
<p><a href="/">Zurück zum Kiosk</a></p>
{% endblock %}
