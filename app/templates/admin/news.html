{% extends "admin/shell.html" %}
{% block admin_page %}
<a href="/admin" class="admin-back js-history-back">← Zurück</a>
{% if saved %}
<article class="contrast">Gespeichert.</article>
{% endif %}
<article class="k-panel">
  <p class="secondary" style="margin-top:0;margin-bottom:0.6rem;font-size:0.92rem">
    Kurze Info, die im Kiosk oberhalb der Inhalte angezeigt wird.
  </p>
  <form method="post" action="/admin/news">
    <label for="msg">Nachricht</label>
    <textarea id="msg" name="message" rows="5" placeholder="Leer lassen zum Ausblenden der Meldung …">{{ stored_notice }}</textarea>
    <p class="secondary" style="margin-top:0.5rem;font-size:0.9rem">
      <strong>Leer speichern:</strong> Die Meldung wird komplett ausgeblendet.
    </p>
    <button type="submit">Speichern</button>
  </form>
</article>
{% endblock %}
