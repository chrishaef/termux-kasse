{% extends "admin/shell.html" %}
{% block body_class %}app-admin app-admin--detail{% endblock %}
{% block admin_page %}
<a href="/admin" class="admin-back">← Admin-Übersicht</a>
{% if error %}
<article class="contrast">{{ error }}</article>
{% endif %}
{% if saved %}
<article class="k-panel">Passwort wurde geändert.</article>
{% endif %}
<article class="k-panel">
  <form method="post" action="/admin/password">
    <label>Aktuelles Passwort <input type="password" name="old_password" required autocomplete="current-password" /></label>
    <label>Neues Passwort <input type="password" name="new_password" required autocomplete="new-password" minlength="4" /></label>
    <label>Neues Passwort wiederholen <input type="password" name="new_password2" required autocomplete="new-password" minlength="4" /></label>
    <button type="submit">Passwort speichern</button>
  </form>
</article>
{% endblock %}
