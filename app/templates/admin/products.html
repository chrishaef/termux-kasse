{% extends "admin/shell.html" %}
{% block admin_page %}
<header class="page-head">
  <p class="page-head__eyebrow">Sortiment</p>
  <h1 class="page-head__title">Artikel</h1>
</header>
<div class="k-toolbar">
  <a href="/admin" class="admin-back" style="margin:0">← Admin</a>
</div>
<article class="k-panel">
  <h2 style="margin-top:0;font-size:1.1rem">Neuer Artikel</h2>
  <form method="post" action="/admin/products">
    <label>Name <input type="text" name="name" required placeholder="Schokoriegel" /></label>
    <label>Preis (EUR) <input type="text" name="price_eur" required placeholder="0,80" /></label>
    <button type="submit">Anlegen</button>
  </form>
</article>
<div class="table-wrap">
  <table role="grid">
    <thead><tr><th>Name</th><th class="num">Preis</th><th>Aktiv</th><th class="th-sort">Sort.</th><th class="th-actions">Aktionen</th></tr></thead>
    <tbody>
      {% for p in products %}
      <tr>
        <td>{{ p['name'] }}</td>
        <td class="num">{{ p['price_cents']|eur }}</td>
        <td>{{ 'ja' if p['active'] else 'nein' }}</td>
        <td class="td-sort">
          <form method="post" action="/admin/products/{{ p['id'] }}/sort" class="form-inline-action">
            <input type="hidden" name="direction" value="up" />
            <button type="submit" class="secondary admin-btn-sm" title="Nach oben">↑</button>
          </form>
          <form method="post" action="/admin/products/{{ p['id'] }}/sort" class="form-inline-action">
            <input type="hidden" name="direction" value="down" />
            <button type="submit" class="secondary admin-btn-sm" title="Nach unten">↓</button>
          </form>
        </td>
        <td class="td-actions">
          <div class="td-actions__inner">
            <form method="post" action="/admin/products/{{ p['id'] }}/toggle" class="form-inline-action">
              <button type="submit" class="secondary admin-btn-sm">Aktiv</button>
            </form>
            <form method="post" action="/admin/products/{{ p['id'] }}/delete" class="form-inline-action" onsubmit="return confirm('Löschen?');">
              <button type="submit" class="secondary admin-btn-sm">Löschen</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
