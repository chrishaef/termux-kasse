{% extends "admin/shell.html" %}
{% block admin_page %}
<div class="k-toolbar">
  <a href="/admin" class="admin-back" style="margin:0">← Admin</a>
</div>
<article class="k-panel">
  <h2 style="margin-top:0;font-size:1.1rem">Neuer Artikel</h2>
  <form method="post" action="/admin/products">
    <label>Name <input type="text" name="name" required placeholder="Schokoriegel" /></label>
    <label>Preis (EUR) <input type="text" name="price_eur" required placeholder="0,80" /></label>
    <button type="submit">Anlegen</button>
  </form>
</article>
<div class="table-wrap">
  <table role="grid" class="admin-products-table">
    <thead><tr><th>Name</th><th class="num">Preis</th><th class="th-sort">Sort.</th><th class="th-actions">Aktionen</th></tr></thead>
    <tbody>
      {% for p in products %}
      <tr>
        <td>{{ p['name'] }}</td>
        <td class="num">{{ p['price_cents']|eur }}</td>
        <td class="td-sort">
          <div class="td-sort__inner">
            <form method="post" action="/admin/products/{{ p['id'] }}/sort" class="form-inline-action">
              <input type="hidden" name="direction" value="up" />
              <button type="submit" class="secondary admin-btn-sm" title="Nach oben">↑</button>
            </form>
            <form method="post" action="/admin/products/{{ p['id'] }}/sort" class="form-inline-action">
              <input type="hidden" name="direction" value="down" />
              <button type="submit" class="secondary admin-btn-sm" title="Nach unten">↓</button>
            </form>
          </div>
        </td>
        <td class="td-actions">
          <div class="td-actions__inner">
            <a href="/admin/products/{{ p['id'] }}/edit" class="admin-btn-sm admin-action-btn admin-btn-edit">Bearbeiten</a>
            <form method="post" action="/admin/products/{{ p['id'] }}/toggle" class="form-inline-action js-product-toggle-form">
              <button
                type="submit"
                class="secondary admin-btn-sm admin-action-btn admin-btn-status js-product-toggle-button {% if p['active'] %}admin-btn-status--active{% else %}admin-btn-status--inactive{% endif %}"
              >
                {{ 'Aktiv' if p['active'] else 'Inaktiv' }}
              </button>
            </form>
            <form method="post" action="/admin/products/{{ p['id'] }}/delete" class="form-inline-action" onsubmit="return confirm('Artikel wirklich löschen?');">
              <button type="submit" class="secondary admin-btn-sm admin-action-btn admin-btn-danger">Löschen</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
<script>
  (function () {
    const forms = document.querySelectorAll(".js-product-toggle-form");
    forms.forEach(function (form) {
      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        const button = form.querySelector(".js-product-toggle-button");
        if (!button || button.disabled) return;

        const originalText = button.textContent;
        button.disabled = true;

        try {
          const response = await fetch(form.action, {
            method: "POST",
            headers: {
              "Accept": "application/json",
              "X-Requested-With": "fetch"
            }
          });
          if (!response.ok) {
            throw new Error("toggle_failed");
          }
          const data = await response.json();
          const active = !!(data && data.active);
          button.textContent = active ? "Aktiv" : "Inaktiv";
          button.classList.toggle("admin-btn-status--active", active);
          button.classList.toggle("admin-btn-status--inactive", !active);
        } catch (_error) {
          button.textContent = originalText;
          window.location.reload();
        } finally {
          button.disabled = false;
        }
      });
    });
  })();
</script>
{% endblock %}
