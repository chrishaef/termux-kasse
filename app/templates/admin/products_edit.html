{% extends "admin/shell.html" %}
{% block body_class %}app-admin app-admin--detail{% endblock %}
{% block admin_page %}
<a href="/admin" class="admin-back">← Admin-Übersicht</a>

<article class="k-panel">
  <form method="post" action="/admin/products/{{ product['id'] }}/edit">
    <label>Name
      <input type="text" name="name" value="{{ product['name'] }}" required />
    </label>
    <label>Preis (EUR)
      <input type="text" name="price_eur" value="{{ price_eur }}" required inputmode="decimal" autocomplete="off" />
    </label>
    <button type="submit">Speichern</button>
  </form>
</article>
{% endblock %}
