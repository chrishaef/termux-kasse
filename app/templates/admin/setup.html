{% extends "base.html" %}
{% block trust %}{% endblock %}
{% block content %}
<h1>Admin einrichten</h1>
<p>Legen Sie den ersten Administrator an. Dies geschieht nur, solange noch kein Admin existiert.</p>
{% if error %}
<article class="contrast">{{ error }}</article>
{% endif %}
<form method="post" action="/admin/setup">
  <label>Benutzername <input type="text" name="username" required autocomplete="username" /></label>
  <label>Passwort <input type="password" name="password" required autocomplete="new-password" /></label>
  <label>Passwort wiederholen <input type="password" name="password2" required autocomplete="new-password" /></label>
  <button type="submit">Speichern</button>
</form>
{% endblock %}
