{% extends "admin/shell.html" %}
{% block admin_page %}
<a href="/admin" class="admin-back js-history-back">← Zurück</a>
<article class="k-panel">
  <h2>Update und Neustart laufen</h2>
  <p>
    Das System startet jetzt den Update-Prozess im Hintergrund. Danach wird die Admin-Seite automatisch neu geladen.
  </p>
  <p>
    Verbleibende Zeit: <strong id="update-countdown">35</strong>s
  </p>
  <p id="update-status" class="secondary">Update wird gestartet ...</p>
</article>
<script>
  (function () {
    const countdownEl = document.getElementById("update-countdown");
    const statusEl = document.getElementById("update-status");
    let secondsLeft = 35;

    fetch("/admin/system-update", {
      method: "POST",
      headers: { "x-requested-with": "fetch" }
    })
      .then(function (res) {
        if (!res.ok) throw new Error("update-start-failed");
        statusEl.textContent = "Update gestartet. Bitte warten, bis der Server neu verfügbar ist.";
      })
      .catch(function () {
        statusEl.textContent = "Update konnte nicht gestartet werden.";
      })
      .finally(function () {
        const timer = window.setInterval(function () {
          secondsLeft -= 1;
          countdownEl.textContent = String(Math.max(0, secondsLeft));
          if (secondsLeft <= 0) {
            window.clearInterval(timer);
            window.location.href = "/admin";
          }
        }, 1000);
      });
  })();
</script>
{% endblock %}
