{% extends "base.html" %}
{% block body_class %}app-admin{% endblock %}
{% block trust %}{% endblock %}
{% block content %}
<header class="page-head">
  <p class="page-head__eyebrow">Stammdaten</p>
  <h1 class="page-head__title">Nutzer</h1>
</header>
<a href="/admin" class="admin-back">← Admin-Übersicht</a>
<article class="k-panel">
  <h2 style="margin-top:0;font-size:1.1rem">Neuer Nutzer</h2>
  <form method="post" action="/admin/users">
    <label>Name <input type="text" name="name" required /></label>
    <label>Gruppe
      <select name="group_id" required>
        {% for g in groups %}
        <option value="{{ g['id'] }}">{{ g['name'] }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">Anlegen</button>
  </form>
</article>
<div class="table-wrap">
  <table role="grid">
    <thead><tr><th>Name</th><th>Gruppe</th><th></th></tr></thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u['name'] }}</td>
        <td>{{ u['group_name'] }}</td>
        <td>
          <form method="post" action="/admin/users/{{ u['id'] }}/delete" onsubmit="return confirm('Nutzer löschen?');">
            <button type="submit" class="secondary">Löschen</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
