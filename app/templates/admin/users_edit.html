{% extends "admin/shell.html" %}
{% block admin_page %}
<header class="page-head">
  <p class="page-head__eyebrow">Stammdaten</p>
  <h1 class="page-head__title">Nutzer bearbeiten</h1>
</header>
<a href="/admin/users" class="admin-back">← Zurück zur Nutzerübersicht</a>

<article class="k-panel">
  <form method="post" action="/admin/users/{{ user['id'] }}/edit">
    <label>Name
      <input type="text" name="name" value="{{ user['name'] }}" required />
    </label>
    <label>Gruppe
      <select name="group_id" required>
        {% for g in groups %}
        <option value="{{ g['id'] }}"{% if g['id'] == user['group_id'] %} selected{% endif %}>{{ g['name'] }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">Speichern</button>
  </form>
</article>
{% endblock %}
