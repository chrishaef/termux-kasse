<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#252b23" />
  <title>{{ title }} · Vertrauenskasse</title>
  <link rel="stylesheet" href="/static/pico.min.css" />
  <link rel="stylesheet" href="/static/kasse.css" />
</head>
<body class="{% block body_class %}app-kiosk{% endblock %}">
  <header class="site-header">
    <div class="site-header__inner container">
      <a href="/" class="site-brand">Vertrauenskasse</a>
      <nav class="site-nav" aria-label="Hauptnavigation">
        <a href="/">Kiosk</a>
        {% block header_nav_extra %}
        <a href="/admin">Admin</a>
        {% endblock %}
      </nav>
    </div>
  </header>
  <main class="site-main container">
    {% block trust %}
    <p class="trust-banner">{{ request.state.kiosk_notice | nl2br }}</p>
    {% endblock %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
