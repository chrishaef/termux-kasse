<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#252b23" />
  <title>{{ title }} · Shopkasse</title>
  <link rel="stylesheet" href="/static/pico.min.css" />
  <link rel="stylesheet" href="/static/kasse.css" />
</head>
<body class="{% block body_class %}app-kiosk{% endblock %}">
  <header class="site-header">
    <div class="site-header__inner container">
      <div class="site-brand-wrap">
        <img
          src="/static/wsg-logo.png"
          alt=""
          id="secret-admin-trigger"
          class="secret-admin-logo"
          aria-label="Geheimer Adminzugang"
        />
        <a href="/" class="site-brand">Shopkasse</a>
      </div>
      <div class="site-header__center">{% block site_header_center %}{% endblock %}</div>
      <nav class="site-nav" aria-label="Hauptnavigation">
        <a href="/">Kiosk</a>
        <a href="/top-ten">Top Ten</a>
        <a href="/preisliste">Preisliste</a>
        {% block header_nav_extra %}
        {% endblock %}
      </nav>
    </div>
  </header>
  <main class="site-main container">
    {% block trust %}{% endblock %}
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer-note" aria-label="Systemhinweis">
    <div class="site-footer-note__center" id="footer-flappy-egg"><strong>powered by OF Häfner</strong></div>
    <div class="site-footer-note__right">
      <span>Version: {{ request.state.last_sync_label }}</span>
      <span class="site-footer-note__repo">Repo: github.com/chrishaef/termux-kasse</span>
    </div>
  </footer>
  <script>
    (function () {
      const trigger = document.getElementById("secret-admin-trigger");
      if (trigger) {
        let count = 0;
        let last = 0;
        const needed = 5;
        trigger.addEventListener("click", function () {
          const now = Date.now();
          if (now - last > 2200) count = 0;
          last = now;
          count += 1;
          if (count >= needed) {
            window.location.href = "/admin";
          }
        });
      }

      if (document.body.classList.contains("app-kiosk")) {
        (function () {
          const el = document.getElementById("footer-flappy-egg");
          if (!el) return;
          const pattern = ["long", "short", "short", "long"];
          const LONG_MIN_MS = 600;
          const SHORT_MAX_MS = 400;
          const GAP_RESET_MS = 5000;
          let step = 0;
          let downAt = 0;
          let idleTimer = 0;
          function resetSequence() {
            step = 0;
            downAt = 0;
            window.clearTimeout(idleTimer);
          }
          function armIdle() {
            window.clearTimeout(idleTimer);
            idleTimer = window.setTimeout(resetSequence, GAP_RESET_MS);
          }
          el.addEventListener("pointerdown", function (ev) {
            if (ev.pointerType === "mouse" && ev.buttons !== 1) return;
            try {
              el.setPointerCapture(ev.pointerId);
            } catch (_e) {}
            downAt = Date.now();
            armIdle();
          });
          el.addEventListener("pointerup", function () {
            if (!downAt) return;
            const held = Date.now() - downAt;
            downAt = 0;
            const want = pattern[step];
            let ok = false;
            if (want === "long") ok = held >= LONG_MIN_MS;
            else ok = held < SHORT_MAX_MS;
            if (!ok) {
              resetSequence();
              return;
            }
            step += 1;
            armIdle();
            if (step >= pattern.length) {
              resetSequence();
              window.location.href = "/egg/flappy";
            }
          });
          el.addEventListener("pointercancel", resetSequence);
        })();

        const path = window.location.pathname;
        if (path === "/preisliste") {
          const goHome = function (event) {
            const target = event.target;
            const interactive =
              target && typeof target.closest === "function"
                ? target.closest(
              "a[href], button, [role='button'], input, select, textarea, label"
                  )
                : null;
            if (interactive) return;
            window.location.href = "/";
          };
          document.addEventListener("pointerdown", goHome);
          document.addEventListener("keydown", goHome, { once: true });
        } else {
          const isBookingPage = /^\/u\/\d+$/.test(path);
          const idleMs = isBookingPage ? 30000 : 60000;
          const idleTarget = isBookingPage ? "/" : "/preisliste";
          let timer = 0;
          const reset = function () {
            window.clearTimeout(timer);
            timer = window.setTimeout(function () {
              window.location.href = idleTarget;
            }, idleMs);
          };
          ["pointerdown", "pointermove", "keydown", "touchstart", "scroll"].forEach(function (ev) {
            document.addEventListener(ev, reset, { passive: true });
          });
          reset();
        }
      }
    })();
  </script>
</body>
</html>
