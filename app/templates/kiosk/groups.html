{% extends "base.html" %}
{% block content %}
{% if groups %}
<div class="k-tiles">
  {% for g in groups %}
  <a class="k-tile" href="/g/{{ g['id'] }}">
    <p class="k-tile__title">{{ g['name'] }}</p>
    <p class="k-tile__hint">Mitglieder anzeigen →</p>
  </a>
  {% endfor %}
</div>
{% else %}
<p class="k-empty">Keine Gruppen vorhanden. Bitte im Admin unter „Nutzergruppen“ anlegen.</p>
{% endif %}
{% endblock %}
