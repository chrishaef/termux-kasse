{% extends "base.html" %}
{% block content %}
<header class="page-head">
  <p class="page-head__eyebrow">Schritt 2 · Mitglied</p>
  <h1 class="page-head__title">{{ group['name'] }}</h1>
  <p class="page-head__lead">Wer möchte etwas buchen?</p>
</header>
<div class="k-toolbar">
  <a href="/" role="button" class="secondary">Alle Gruppen</a>
</div>
{% if users %}
<div class="k-tiles">
  {% for u in users %}
  <a class="k-tile" href="/u/{{ u['id'] }}">
    <p class="k-tile__title">{{ u['name'] }}</p>
    <p class="k-tile__hint">Konto &amp; Artikel →</p>
  </a>
  {% endfor %}
</div>
{% else %}
<p class="k-empty">Keine Mitglieder in dieser Gruppe.</p>
{% endif %}
{% endblock %}
