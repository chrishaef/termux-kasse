{% extends "base.html" %}
{% block content %}
<header class="page-head k-member-head">
  <div class="k-member-head__actions">
    <a href="/" class="admin-back">← Zurück</a>
  </div>
  <div class="k-member-head__main">
    <h1 class="page-head__title">{{ group['name'] }}</h1>
  </div>
  <div class="k-member-head__spacer" aria-hidden="true"></div>
</header>
{% if users %}
<div class="k-tiles">
  {% for u in users %}
  <a class="k-tile" href="/u/{{ u['id'] }}">
    <p class="k-tile__title">{{ u['name'] }}</p>
    <p class="k-tile__hint">Konto &amp; Artikel →</p>
  </a>
  {% endfor %}
</div>
{% else %}
<p class="k-empty">Keine Mitglieder in dieser Gruppe.</p>
{% endif %}
{% endblock %}
