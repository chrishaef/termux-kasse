{% extends "base.html" %}
{% block trust %}{% endblock %}
{% block content %}
<section class="k-preisliste-layout" aria-label="Preisliste">
  <div class="k-preisliste-left">
    <h2 class="k-preisliste-title">Artikel & Preise</h2>
    {% if products %}
    <ul class="k-preisliste-list">
      {% for p in products %}
      <li>
        <span class="k-preisliste-item">{{ p['name'] }}</span>
        <span class="k-preisliste-price">{{ p['price_cents']|eur }}</span>
      </li>
      {% endfor %}
    </ul>
    {% else %}
    <p class="k-preisliste-empty">Keine aktiven Artikel vorhanden.</p>
    {% endif %}
  </div>
  <div class="k-preisliste-right">
    <img src="/static/wsg-logo.png" alt="" class="k-saver-logo" />
  </div>
</section>
{% endblock %}
