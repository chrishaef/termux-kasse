{% extends "base.html" %}
{% block trust %}{% endblock %}
{% block content %}
<a href="/" class="admin-back">← Zurück</a>

<div class="k-top-ten-switch" role="tablist" aria-label="Ranking-Sortierung">
  <a
    href="/top-ten?ranking=entries"
    role="button"
    class="{% if ranking_mode == 'entries' %}k-top-ten-switch__btn--active{% else %}secondary outline{% endif %}"
  >Nach Buchungen</a>
  <a
    href="/top-ten?ranking=payments"
    role="button"
    class="{% if ranking_mode == 'payments' %}k-top-ten-switch__btn--active{% else %}secondary outline{% endif %}"
  >Nach Zahlungen</a>
</div>

<div class="table-wrap k-top-ten-table-wrap">
  <table role="grid" class="k-top-ten-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Nutzer</th>
        <th>Gruppe</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td class="num">{{ loop.index }}</td>
        <td>{{ row['user_name'] }}</td>
        <td>{{ row['group_name'] }}</td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="secondary">Noch keine Buchungen vorhanden.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
